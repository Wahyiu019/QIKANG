name: Deploy Vite App to GitHub Pages

on:
  # 当代码推送到 main 分支时触发部署
  push:
    branches: ["main"]
  # 允许手动在 Actions 页面触发部署
  workflow_dispatch:

# 设置 GitHub Pages 部署所需的权限
permissions:
  contents: read
  pages: write
  id-token: write

# 允许并发部署，但只保留最新的部署进程
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # 注释掉 cache 功能，避免没找到 package-lock.json 报错
          # cache: 'npm' 

      - name: Install dependencies
        # 这里使用 npm install 生成依赖树，即使没有 lock 文件也能正常安装
        run: npm install 

      - name: Build
        # 执行打包命令，Vite 会把打包好的静态文件放在 dist 目录下
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 上传 dist 目录作为 Pages 的资源
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
